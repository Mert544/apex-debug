name: Apex Debug

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v

      - name: Self-scan
        run: |
          apex analyze . --min-severity medium --exit-code
